<!DOCTYPE html>
<html>
<head>
	<style>
		.container{
			display:grid;
			gap: 16px;
			grid-template-columns: repeat(4, 350px) ;

		}
		.item {
			border: 1px solid black;
		
		}
		.item img {
			width: 100%;
		}
		#item1 {
			grid-column: 1 / 3;
			grid-row: 2 / 4;
		}
	</style>
</head>
<body>
	<div class="container">
	<div class="item">
		<img src="bedard.jpg" alt="connor bedard">
	</div>
	
	<div class="item">
		<img src="mack.webp" alt="macklin cellebrini">
	</div>
	
	<div class="item">
		<img src="slaf1.jpg" alt="juraj slafkosky">
	</div>
	<div class="item">
		<img src="makar.jpg" alt="cale makar"></div>

</body>
</html>
