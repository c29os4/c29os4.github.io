<!DOCTYPE html>
<html>
<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
</head>
<body>
<script>
	let xpos
	let ypos
	function setup() {
		createCanvas(800,800)
		background(200)
		xpos = width/2
		ypos = height/2
		
		
	}
	function draw() {
		
	let randomNumber = floor(random(4))
	
	if (randomNumber == 0) {
	xpos = xpos + 1
	} else if (randomNumber == 1) {
	xpos = xpos - 1
	} else if (randomNumber == 2) {
	ypos = ypos + 1
	} else if (randomNumber == 3) {
	ypos = ypos - 1
	}
	
	
	
	



	circle(xpos, ypos, 10)


}

</script>
</body>
</html>
