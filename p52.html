<!DOCTYPE html>
<html>
<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.12/lib/p5.min.js"></script>
</head>

<body>
<script>
	function setup() {
		createCanvas(400, 400);
	} 

	function draw() {
		background(200);

		for (let i = 0; i < 5; i++) {
			for(let j = 0; j < 9; j++) {
			let x = i * 100
			let y = j * 100
			fill ("white")
			circle(x, y, 100);
			fill ("black")
			circle(x, y, 80)
			fill ("blue")
			circle(x, y, 60)
			fill("red")
			circle(x, y, 40)
			fill ("yellow")
			circle(x, y, 20)
			
			circle(x, y, 5)

		}
	  }	
	}
</script>
</body>
</html>
