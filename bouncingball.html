<!DOCTYPE html>
<html>
<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
</head>
<body>
	<script>
		let xpos
		let ypos
		let xspeed
		let yspeed
	function setup() {
		createCanvas(800,800)
		xpos = width/2
		ypos = height/2
		xspeed = -5
		yspeed = 8
		d = 50
		fillColor = "blue"
		

		
		
	}

	function draw() {
	background(200)
	if (xpos + d/2 > width ||xpos - d/2 < 0) {
		xspeed *= -1
	}
	if (ypos + d/2 > width ||ypos - d/2 < 0) {
		yspeed *= -1
	}
	if (xpos > width/2 && ypos < height/2) {
		fillColor = "yellow"

	} else {
	fillColor = "blue"

}
	xpos += xspeed
	ypos += yspeed
	fill(fillColor)
	circle(xpos, ypos, d)
}
	</script>



</body>
</html>
